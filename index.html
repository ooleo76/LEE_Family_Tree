<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山內村 李氏族譜 · 即時世系</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{
  --paper:#efe7d6;--ink:#2a2420;--ink-soft:#5d544a;--lacquer:#2b1a17;
  --cinnabar:#b22a1f;--cinnabar-soft:#c4584c;--gold:#c9a227;--gold-soft:#d8bd6a;
  --muted:#8a7e6a;--line:rgba(42,36,32,.16);
  --c-m:#b22a1f;--c-f:#9b7b3a;--c-x:#6f665a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"Noto Sans TC",system-ui,sans-serif;color:var(--ink);background:var(--paper)}
body{display:flex;flex-direction:column;overflow:hidden}
.topbar{flex:0 0 auto;background:linear-gradient(160deg,var(--lacquer),#3a2420);color:#f3e9d2;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid var(--gold);z-index:20}
.brand{font-family:"Noto Serif TC",serif;font-weight:900;font-size:18px;letter-spacing:.06em;color:#f7eed6;white-space:nowrap}
.brand .dot{color:var(--cinnabar-soft)}
.brand small{display:block;font-family:"Noto Sans TC";font-weight:400;font-size:10px;color:#cbb98f;letter-spacing:.16em;margin-top:1px}
.spacer{flex:1}
.seg{display:flex;border:1px solid rgba(201,162,39,.5);border-radius:4px;overflow:hidden}
.seg button{font-family:inherit;font-size:12.5px;font-weight:500;color:#e7d9b8;background:transparent;border:0;border-left:1px solid rgba(201,162,39,.3);padding:6px 10px;cursor:pointer;white-space:nowrap}
.seg button:first-child{border-left:0}
.seg button.on{background:var(--cinnabar);color:#fff}
.search input{font-family:inherit;font-size:13px;color:#f3e9d2;background:rgba(0,0,0,.25);border:1px solid rgba(201,162,39,.4);border-radius:4px;padding:6px 10px;width:140px;outline:none}
.search input::placeholder{color:#b6a888}
.tbtn{font-family:inherit;font-size:12.5px;color:#e7d9b8;background:rgba(0,0,0,.2);border:1px solid rgba(201,162,39,.4);border-radius:4px;padding:6px 9px;cursor:pointer;white-space:nowrap}
.tbtn:hover{background:rgba(178,42,31,.35);border-color:var(--cinnabar-soft)}
.tbtn.act{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}

.stats{flex:0 0 auto;background:rgba(43,26,23,.04);border-bottom:1px solid var(--line);padding:6px 14px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft);z-index:10}
.stats b{font-family:"Noto Serif TC",serif;color:var(--cinnabar);font-size:15px;font-weight:900;margin-right:3px}
.stats .m{color:#2f6f9e;font-weight:700}.stats .f{color:#9b7b3a;font-weight:700}
.stats .src{margin-left:auto;font-size:11px}
.dot-live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e9b57;margin-right:5px;vertical-align:1px}
.dot-demo{background:#c9a227}

.stage{flex:1 1 auto;position:relative;overflow:hidden}
svg{width:100%;height:100%;display:block;cursor:grab}
svg:active{cursor:grabbing}
.link{fill:none;stroke:var(--line);stroke-width:1.4px}
.link.lineage{stroke:rgba(178,42,31,.32)}
.node foreignObject{overflow:visible}

.card{
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1.5px solid var(--line);border-radius:8px;background:#fbf7ec;cursor:pointer;
  box-shadow:0 2px 5px rgba(43,26,23,.08);transition:box-shadow .15s,transform .12s,border-color .15s;position:relative;
}
.card:hover{box-shadow:0 5px 14px rgba(43,26,23,.18)}
.card.k-m{border-color:rgba(178,42,31,.45)}
.card.k-f{border-color:rgba(155,123,58,.5)}
.card.k-x{border-color:var(--line);background:#f6f1e6}
.card.root{border-color:var(--gold);background:linear-gradient(180deg,#fff7e3,#fbf2db)}
.card.hit{outline:3px solid var(--gold);outline-offset:1px}
.who{display:flex;align-items:center;justify-content:center}
.nm{font-family:"Noto Serif TC",serif;font-weight:700;letter-spacing:.04em;line-height:1.16}
.k-m .nm{color:var(--cinnabar)} .k-f .nm{color:#86692c} .k-x .nm{color:#3f3a33} .root .nm{color:var(--lacquer)}
.sp{font-family:"Noto Serif TC",serif;font-weight:500;color:var(--muted);line-height:1.16}
.sp .mk{color:var(--cinnabar-soft)}
.role{order:-1;font-size:10.5px;color:#fff;background:var(--c-x);border-radius:8px;padding:0 6px;letter-spacing:.04em;white-space:nowrap}
.k-m .role{background:var(--c-m)} .k-f .role{background:var(--c-f)} .root .role{background:var(--gold);color:var(--lacquer);font-weight:700}
.life{font-size:10px;color:var(--ink-soft);margin-top:2px;white-space:nowrap}
.ph{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);margin-bottom:2px}
.kids{position:absolute;background:var(--cinnabar);color:#fff;font-size:10.5px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--paper);font-weight:700}
.card.open .kids{background:var(--ink-soft)}

/* ---- 直書（桌機 TB） ---- */
.tb .card{padding:6px 5px}
.tb .who{flex-direction:row-reverse;gap:4px;align-items:flex-start}
.tb .nm{writing-mode:vertical-rl;white-space:nowrap;font-size:17px}
.tb .sp{writing-mode:vertical-rl;white-space:nowrap;font-size:17px}
.tb .role{margin-bottom:3px}
.tb .kids{left:50%;bottom:-10px;transform:translateX(-50%)}
/* ---- 橫書（手機 LR） ---- */
.lr .card{padding:5px 8px}
.lr .who{flex-direction:column}
.lr .nm{font-size:15px}
.lr .sp{font-size:15px;margin-top:1px}
.lr .role{margin-bottom:2px}
.lr .kids{right:-10px;top:50%;transform:translateY(-50%)}

.zoomctl{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px;z-index:15}
.zoomctl button{width:36px;height:36px;border:1px solid var(--line);background:#fbf7ec;border-radius:8px;font-size:17px;color:var(--ink-soft);cursor:pointer;box-shadow:0 2px 6px rgba(43,26,23,.12)}
.zoomctl button:hover{background:#fff;color:var(--cinnabar);border-color:var(--cinnabar)}
.zoomctl .fit{font-size:11px;font-weight:700}
.legend{position:absolute;left:12px;bottom:12px;background:rgba(251,247,236,.92);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:11.5px;color:var(--ink-soft);z-index:15;line-height:1.85}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px}
.legend .sm{background:var(--c-m)}.legend .sf{background:var(--c-f)}.legend .sx{background:var(--c-x)}
.banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--ink-soft);z-index:5}
.banner .big{font-family:"Noto Serif TC",serif;font-size:17px;color:var(--cinnabar);margin-bottom:8px}
.banner.err .big{color:#a33}
.spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--cinnabar);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}
@media (max-width:600px){.brand small{display:none}.legend{display:none}.search input{width:104px}}
</style>
</head>

<div class="topbar">
  <div class="brand">山內村<span class="dot">·</span>李氏族譜<small>雲林 · 元長 · 山內村　即時世系</small></div>

  <button class="tbtn" id="orientBtn" title="切換直式／橫式">▦ 版面</button>

<div class="stats" id="stats"></div>
<div class="stage">

  <div class="banner" id="banner" style="display:none"></div>
</div>

const CN={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function genOfKey(k){ const m=String(k).match(/^第(.+)代$/); if(!m) return null; const s=m[1]; return CN[s]||parseInt(s)||null; }
function numCN(n){ const a=['','一','二','三','四','五','六','七','八','九','十']; if(n<=10) return a[n]; if(n<20) return '十'+a[n-10]; return String(n); }
function rankRole(n,sex){ const r = n===1?'長':n===2?'次':numCN(n); return r+(sex==='女'?'女':'子'); }
function parentName(note){ if(!note) return ''; return note.replace(/[長次三四五六七八九十兩幼么元滿大小細]?[子女男]$/,'').trim(); }
function kindOf(name,sex){ const sur=(name||'').trim().charAt(0); if(sur!=='李') return 'x'; return sex==='女'?'f':'m'; }

/* ---------- rows(一房) -> 樹根 ---------- */
function buildHouse(rows){

    let gen=null,name='';
    for(const k in r){ const g=genOfKey(k); if(g && String(r[k]).trim()){ gen=g; name=String(r[k]).trim(); break; } }

    const sexCN=(String(r['子女']||'').trim()==='女')?'女':'子';
    const sp=(r['配偶']||'').trim()? String(r['配偶']).split(/[、,，]/).map(s=>s.trim()).filter(Boolean):[];
    nodes.push({ row:idx, gen, name, note, sexCN, gender:sexCN==='女'?'女':'男',
      spouse:sp, birth:(r['生年']||'').trim(), death:(r['卒年']||'').trim(), photo:(r['照片網址']||r['照片']||'').trim(),
      kind:kindOf(name,sexCN), role:'', children:[] });
  });
  // 連結父子
  let root=null;
  nodes.forEach((n,i)=>{
    if(n.gen===1){ if(!root){ root=n; } return; }
    const pn=parentName(n.note);
    let parent=null;
    for(let j=i-1;j>=0;j--){ if(nodes[j].gen===n.gen-1 && nodes[j].name===pn){ parent=nodes[j]; break; } }
    if(!parent) for(let j=i-1;j>=0;j--){ if(nodes[j].gen===n.gen-1){ parent=nodes[j]; break; } }
    (parent||root).children.push(n);
  });
  // 自動排行（依列順序、分男女）
  (function rank(n){ let c=0,d=0; n.children.forEach(k=>{ if(k.sexCN==='女'){d++;k.role=rankRole(d,'女');} else {c++;k.role=rankRole(c,'子');} rank(k); }); })(root);
  return root;
}
function buildModel(dataObj){
  const keys=Object.keys(dataObj);
  const houses=keys.map(k=>buildHouse(dataObj[k]));
  houses.forEach((h,i)=>h.role='');
  return { name:FOUNDER.name, role:'始祖', sexCN:'子', gender:'男', kind:'root', spouse:FOUNDER.spouse.slice(), birth:'',death:'',photo:'', children:houses };
}

/* ---------- 取資料（GAS JSONP）---------- */
function jsonp(url){ return new Promise((res,rej)=>{
  const cb='__fam_'+Math.random().toString(36).slice(2);
  const s=document.createElement('script');
  window[cb]=d=>{ res(d); delete window[cb]; s.remove(); };
  s.onerror=()=>{ rej(new Error('JSONP 失敗')); s.remove(); };
  s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
  document.body.appendChild(s);
  setTimeout(()=>{ if(window[cb]){ delete window[cb]; s.remove(); rej(new Error('逾時')); } },12000);
});}
let MODEL=null, SOURCE='demo';
async function loadModel(){
  if(GAS_URL){
    try{ const j=await jsonp(GAS_URL); if(j&&j.ok&&j.data){ MODEL=buildModel(j.data); SOURCE='live'; return; } throw new Error('格式錯誤'); }
    catch(e){ console.error(e); showBanner('讀取試算表失敗，改用示範資料。請確認 GAS 已部署為「任何人」可存取，網址正確。',true); }
  }
  MODEL=buildModel(DEMO_DATA); SOURCE='demo';
}

/* ---------- d3 ---------- */
const svg=d3.select('#svg'), vp=d3.select('#viewport');
let ORIENT = (window.innerWidth>=820)?'TB':'LR';   // 桌機上→下直書；手機左→右
const DIM={ TB:{w:80,h:122,cross:104,level:165}, LR:{w:132,h:60,cross:74,level:200} };
let zoom=d3.zoom().scaleExtent([0.08,2.2]).on('zoom',e=>vp.attr('transform',e.transform));
svg.call(zoom);
let rootD3=null, currentRootData=null, uid=0;

function applyOrientClass(){ document.getElementById('viewport').setAttribute('class', ORIENT==='TB'?'tb':'lr'); }
function px(d){ return ORIENT==='TB'? d.x : d.depth*DIM.LR.level; }
function py(d){ return ORIENT==='TB'? d.depth*DIM.TB.level : d.x; }

function countStats(node){ let dir=0,m=0,f=0,sp=0;
  (function w(n){ if(n.kind!=='root'){ dir++; if(n.gender==='女')f++; else m++; sp+=(n.spouse?n.spouse.filter(x=>x&&x!=='（佚名）').length:0);} (n.children||[]).forEach(w);})(node);
  return {dir,m,f,sp}; }
function renderStats(){
  const s=countStats(currentRootData), live=SOURCE==='live';
  document.getElementById('stats').innerHTML=
   `<span><b>${s.dir}</b>直系子孫</span><span>男 <span class="m">${s.m}</span>　女 <span class="f">${s.f}</span></span>
    <span><b>${s.dir+s.sp}</b>含配偶總計</span>
    <span class="src"><span class="dot-live ${live?'':'dot-demo'}"></span>${live?'已連動試算表（即時）':'示範資料（尚未連動）'}</span>`;
}

const tree=d3.tree();
function relayout(){ tree.nodeSize([DIM[ORIENT].cross,1]); tree(rootD3); }

function setRoot(dataNode){
  currentRootData=dataNode;
  rootD3=d3.hierarchy(dataNode,d=>d.children);
  rootD3.each(d=>{ if(d.depth>=2 && d.children){ d._children=d.children; d.children=null; } });
  rootD3.x0=0; rootD3.y0=0;
  update(rootD3); renderStats(); setTimeout(fitView,60);
}
function update(source){
  relayout();
  const nodes=rootD3.descendants(), links=rootD3.links();
  const W=DIM[ORIENT].w, H=DIM[ORIENT].h;

  const link=vp.selectAll('path.link').data(links,d=>d.target.__id||(d.target.__id=++uid));
  link.exit().remove();
  link.enter().append('path').attr('class',d=>'link'+linkLineage(d))
      .attr('d',()=>edge(source.x0s||0,source.y0s||0,source.x0s||0,source.y0s||0,W,H))
    .merge(link).transition().duration(320)
      .attr('class',d=>'link'+linkLineage(d))
      .attr('d',d=>edge(px(d.source),py(d.source),px(d.target),py(d.target),W,H));

  const node=vp.selectAll('g.node').data(nodes,d=>d.__id||(d.__id=++uid));
  node.exit().transition().duration(280).style('opacity',0).remove();
  const en=node.enter().append('g').attr('class','node')
    .attr('transform',`translate(${source.x0s||0},${source.y0s||0})`).style('opacity',0)
    .on('click',(e,d)=>{ e.stopPropagation(); toggle(d); zoomTo(d); });
  en.append('foreignObject');
  const merged=en.merge(node);
  merged.select('foreignObject')
    .attr('width',W).attr('height',H).attr('x',-W/2).attr('y',-H/2).html(d=>cardHTML(d));
  merged.transition().duration(320).attr('transform',d=>`translate(${px(d)},${py(d)})`).style('opacity',1);

  nodes.forEach(d=>{ d.x0s=px(d); d.y0s=py(d); });
  source.x0s=px(source); source.y0s=py(source);
}
function linkLineage(d){ const k=d.target.data.kind; return (k==='m'||k==='root')?' lineage':''; }
function edge(sx,sy,tx,ty,W,H){
  if(ORIENT==='TB'){ const my=(sy+ty)/2; return `M${sx},${sy+H/2-5} V${my} H${tx} V${ty-H/2+5}`; }
  const mx=(sx+tx)/2; return `M${sx+W/2-5},${sy} H${mx} V${ty} H${tx-W/2+5}`;
}
function cardHTML(d){
  const o=d.data, has=d.children||d._children;
  const cnt=has?(d.children?d.children.length:d._children.length):0, open=!!d.children;
  let life=''; if(o.birth||o.death){ life=o.death?`${o.birth||'?'}–${o.death}`:`${o.birth}– 在世`; }
  const role = o.kind==='root'?'始祖':(o.role||'');
  return `<div class="card k-${o.kind} ${o.kind==='root'?'root':''}" data-name="${o.name} ${(o.spouse||[]).join(' ')}">
    ${o.photo?`<img class="ph" src="${o.photo}" alt="" onerror="this.style.display='none'">`:''}
    <div class="who"><span class="nm">${o.name}</span>${(o.spouse&&o.spouse.length)?`<span class="sp"><span class="mk">⚭</span>${o.spouse.join('、')}</span>`:''}</div>
    ${role?`<span class="role">${role}</span>`:''}
    ${life?`<span class="life">${life}</span>`:''}
    ${cnt?`<span class="kids ${open?'open':''}">${open?'–':cnt}</span>`:''}
  </div>`;
}
function toggle(d){ if(d.children){d._children=d.children;d.children=null;} else if(d._children){d.children=d._children;d._children=null;} update(d); }

/* zoom */
function svgSize(){ const r=svg.node().getBoundingClientRect(); return [r.width,r.height]; }
function zoomTo(d){ const [w,h]=svgSize(), s=0.9;
  const t=d3.zoomIdentity.translate(w/2-px(d)*s, (ORIENT==='TB'?h*0.30:h/2)-py(d)*s).scale(s);
  svg.transition().duration(420).call(zoom.transform,t); }
function fitView(){ const ns=rootD3.descendants(); if(!ns.length) return;
  const W=DIM[ORIENT].w,H=DIM[ORIENT].h;
  const X=ns.map(px),Y=ns.map(py);
  const x0=Math.min(...X)-W,x1=Math.max(...X)+W,y0=Math.min(...Y)-H,y1=Math.max(...Y)+H;
  const [w,h]=svgSize(), s=Math.min(1.4,0.92*Math.min(w/(x1-x0),h/(y1-y0)));
  svg.transition().duration(420).call(zoom.transform, d3.zoomIdentity.translate(w/2-s*(x0+x1)/2,h/2-s*(y0+y1)/2).scale(s)); }
document.getElementById('zin').onclick=()=>svg.transition().call(zoom.scaleBy,1.3);
document.getElementById('zout').onclick=()=>svg.transition().call(zoom.scaleBy,1/1.3);
document.getElementById('zfit').onclick=fitView;

/* orient toggle */
document.getElementById('orientBtn').onclick=()=>{ ORIENT=ORIENT==='TB'?'LR':'TB'; applyOrientClass(); update(rootD3); setTimeout(fitView,80); };

/* branch / expand / collapse */
document.getElementById('branchSeg').addEventListener('click',e=>{ const b=e.target.dataset.b; if(b===undefined)return;
  document.querySelectorAll('#branchSeg button').forEach(x=>x.classList.toggle('on',x===e.target));
  setRoot(b==='all'?MODEL:MODEL.children[+b]); });
document.getElementById('expandAll').onclick=()=>{ rootD3.each(d=>{ if(d._children){d.children=d._children;d._children=null;} }); update(rootD3); setTimeout(fitView,80); };
document.getElementById('collapseAll').onclick=()=>{ rootD3.each(d=>{ if(d.depth>=1 && d.children){d._children=d.children;d.children=null;} }); update(rootD3); setTimeout(fitView,80); };

/* search */
let stmr; const se=document.getElementById('search');
se.addEventListener('input',()=>{clearTimeout(stmr);stmr=setTimeout(doSearch,160);});
function doSearch(){ const q=se.value.trim(); vp.selectAll('.card').classed('hit',false); if(!q)return;
  let target=null;
  (function f(d){ if(d.data.name.includes(q)||(d.data.spouse||[]).some(s=>s.includes(q))) target=target||d; (d.children||d._children||[]).forEach(c=>{c.parent=d;f(c);}); })(rootD3);
  if(!target) return;
  let p=target,chain=[]; while(p){chain.unshift(p);p=p.parent;} chain.forEach(d=>{ if(d._children){d.children=d._children;d._children=null;} });
  update(rootD3);
  setTimeout(()=>{ vp.selectAll('g.node').filter(d=>d===target).select('.card').classed('hit',true); zoomTo(target); },140);
}
document.getElementById('refresh').onclick=async()=>{ showBanner('讀取中…'); await loadModel(); hideBanner(); boot(); };
function showBanner(m,err){const b=document.getElementById('banner');b.style.display='block';b.className='banner'+(err?' err':'');b.innerHTML=(err?'':'<div class="spin"></div>')+`<div class="big">${err?'⚠ ':''}${m}</div>`;}
function hideBanner(){document.getElementById('banner').style.display='none';}
function boot(){ applyOrientClass(); vp.selectAll('*').remove();
  document.querySelectorAll('#branchSeg button').forEach(x=>x.classList.toggle('on',x.dataset.b==='all'));
  setRoot(MODEL); }
(async function(){ showBanner('讀取中…'); await loadModel(); hideBanner(); boot(); })();
</script>
</body>
