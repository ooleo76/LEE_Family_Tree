<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山內村 李氏族譜 · 即時世系</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{
  --paper:#efe7d6;--ink:#2a2420;--ink-soft:#5d544a;--lacquer:#2b1a17;--lacquer-2:#3a2420;
  --cinnabar:#b22a1f;--cinnabar-soft:#c4584c;--gold:#c9a227;--gold-soft:#d8bd6a;
  --muted:#8a7e6a;--line:rgba(42,36,32,.16);--line-strong:rgba(42,36,32,.3);
  --c-m:#b22a1f;--c-f:#9b7b3a;--c-x:#6f665a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Noto Sans TC",system-ui,sans-serif;color:var(--ink);background:var(--paper);
  display:flex;flex-direction:column;overflow:hidden}
.serif{font-family:"Noto Serif TC",serif}

/* ===== HERO（接回最初的介紹） ===== */
header.hero{flex:0 0 auto;position:relative;background:linear-gradient(160deg,var(--lacquer),var(--lacquer-2));
  color:#f3e9d2;padding:22px 22px 16px;overflow:hidden;border-bottom:3px solid var(--gold)}
header.hero::before{content:"隴 西";position:absolute;top:8px;right:20px;writing-mode:vertical-rl;
  font-family:"Noto Serif TC",serif;font-weight:900;font-size:80px;color:rgba(201,162,39,.10);letter-spacing:.1em;line-height:.9;pointer-events:none}
.hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:2;display:flex;align-items:flex-end;gap:26px;flex-wrap:wrap}
.hero-main{flex:1 1 360px;min-width:260px}
.eyebrow{font-size:11.5px;letter-spacing:.34em;color:var(--gold-soft);font-weight:700;margin-bottom:8px}
.hero h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(28px,5vw,46px);margin:0 0 4px;letter-spacing:.06em;color:#f7eed6}
.hero h1 .dot{color:var(--cinnabar-soft)}
.hero .sub{font-family:"Noto Serif TC",serif;font-size:clamp(13px,2vw,16px);color:#d9c9a4;letter-spacing:.12em;margin-bottom:10px}
.founder{display:inline-flex;align-items:center;gap:12px;background:rgba(0,0,0,.22);border:1px solid rgba(201,162,39,.4);border-radius:4px;padding:8px 16px}
.founder .tag{font-size:10px;letter-spacing:.3em;color:var(--gold-soft);writing-mode:vertical-rl;line-height:1}
.founder .nm{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;letter-spacing:.16em;color:#f7eed6}
.founder .nm small{display:block;font-size:11px;color:#cbb98f;font-weight:400;letter-spacing:.08em;margin-top:2px}
.origin{font-size:12px;color:#cdbd97;line-height:1.85;border-left:2px solid var(--cinnabar);padding-left:12px;margin-top:10px;max-width:560px}
.origin b{color:#eaddbc;font-weight:500}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
.stat .num{font-family:"Noto Serif TC",serif;font-weight:900;font-size:26px;color:var(--gold-soft);line-height:1}
.stat .num .mf{font-size:14px;color:#cbb98f;font-weight:500}
.stat .lbl{font-size:10.5px;letter-spacing:.16em;color:#b6a888;margin-top:4px}
.src-line{flex-basis:100%;font-size:11px;color:#b6a888;margin-top:4px}
.dot-live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#54c483;margin-right:5px;vertical-align:1px}
.dot-demo{background:var(--gold)}

/* ===== TOOLBAR ===== */
.toolbar{flex:0 0 auto;background:rgba(239,231,214,.96);border-bottom:1px solid var(--line-strong);
  padding:8px 14px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;z-index:20}
.seg{display:flex;border:1.5px solid var(--line-strong);border-radius:4px;overflow:hidden;background:var(--paper)}
.seg button{font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-soft);background:transparent;border:0;border-left:1px solid var(--line);padding:7px 11px;cursor:pointer;white-space:nowrap}
.seg button:first-child{border-left:0}
.seg button.on{background:var(--cinnabar);color:#fff}
.search{flex:1 1 150px;position:relative;min-width:120px}
.search input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line-strong);border-radius:4px;padding:7px 12px;outline:none}
.search input:focus{border-color:var(--cinnabar)}
.btn{font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-soft);background:var(--paper);border:1.5px solid var(--line-strong);border-radius:4px;padding:7px 10px;cursor:pointer;white-space:nowrap}
.btn:hover{border-color:var(--cinnabar);color:var(--cinnabar)}
.btn.on{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}

/* ===== STAGE ===== */
.stage{flex:1 1 auto;position:relative;overflow:hidden}
svg{width:100%;height:100%;display:block;cursor:grab}
svg:active{cursor:grabbing}
.link{fill:none;stroke:var(--line);stroke-width:1.4px}
.link.lineage{stroke:rgba(178,42,31,.32)}
.node foreignObject{overflow:visible}
.card{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  border:1.5px solid var(--line);border-radius:8px;background:#fbf7ec;cursor:pointer;padding:6px 5px;
  box-shadow:0 2px 5px rgba(43,26,23,.08);position:relative}
.card:hover{box-shadow:0 5px 14px rgba(43,26,23,.18)}
.card.k-m{border-color:rgba(178,42,31,.45)} .card.k-f{border-color:rgba(155,123,58,.5)}
.card.k-x{border-color:var(--line);background:#f6f1e6} .card.root{border-color:var(--gold);background:linear-gradient(180deg,#fff7e3,#fbf2db)}
.card.hit{outline:3px solid var(--gold);outline-offset:1px}
.card .role{font-size:10.5px;color:#fff;background:var(--c-x);border-radius:8px;padding:0 6px;margin-bottom:4px;white-space:nowrap}
.card.k-m .role{background:var(--c-m)} .card.k-f .role{background:var(--c-f)} .card.root .role{background:var(--gold);color:var(--lacquer);font-weight:700}
.card .nm{font-family:"Noto Serif TC",serif;font-weight:700;font-size:18px;letter-spacing:.05em;
  writing-mode:vertical-rl;line-height:1.18;white-space:nowrap}
.card.k-m .nm{color:var(--cinnabar)} .card.k-f .nm{color:#86692c} .card.k-x .nm{color:#3f3a33} .card.root .nm{color:var(--lacquer)}
.card .sp{font-family:"Noto Serif TC",serif;font-size:14px;font-weight:500;color:var(--muted);
  margin-top:5px;text-align:center;max-width:100%;line-height:1.35;word-break:break-all}
.card .sp .mk{color:var(--cinnabar-soft);margin-right:1px}
.card .life{font-size:10px;color:var(--ink-soft);margin-top:3px;white-space:nowrap}
.card .ph{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);margin-bottom:3px}
.card .kids{position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);background:var(--cinnabar);color:#fff;
  font-size:10.5px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--paper);font-weight:700}
.card.open .kids{background:var(--ink-soft)}

/* ===== LIST（手機：第一版縮排清單） ===== */
#list{position:absolute;inset:0;overflow:auto;padding:10px 12px 60px;display:none}
.lnode{position:relative}
.lnode .lkids{margin-left:16px;border-left:1px solid var(--line);padding-left:3px}
.lnode.lineage>.lkids{border-left:1.5px solid rgba(178,42,31,.3)}
.lrow{display:flex;align-items:flex-start;gap:6px;padding:5px 6px;border-radius:5px;cursor:pointer}
.lrow:hover{background:rgba(178,42,31,.06)}
.lrow.dim{opacity:.34} .lrow.hit{background:rgba(201,162,39,.24)}
.ltoggle{flex:0 0 16px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;margin-top:1px}
.ltoggle.empty{visibility:hidden}
.lnode.collapsed>.lrow .ltoggle{transform:rotate(-90deg)}
.lnode.collapsed>.lkids{display:none}
.lperson{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;flex:1}
.lnm{font-family:"Noto Serif TC",serif;font-weight:700;font-size:17px;letter-spacing:.04em}
.k-m .lnm{color:var(--cinnabar)} .k-f .lnm{color:#86692c} .k-x .lnm{color:#3f3a33} .root .lnm{color:var(--lacquer)}
.lrole{font-size:11px;color:#fff;background:var(--c-x);padding:1px 7px;border-radius:9px;transform:translateY(-1px)}
.k-m .lrole{background:var(--c-m)} .k-f .lrole{background:var(--c-f)} .root .lrole{background:var(--gold);color:var(--lacquer);font-weight:700}
.lsp{font-size:14px;color:var(--muted)} .lsp .mk{color:var(--cinnabar-soft);margin-right:1px}
.llife{font-size:11px;color:var(--ink-soft)}
.lcnt{font-size:11px;color:var(--muted);align-self:center}

.zoomctl{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px;z-index:15}
.zoomctl button{width:36px;height:36px;border:1px solid var(--line);background:#fbf7ec;border-radius:8px;font-size:17px;color:var(--ink-soft);cursor:pointer;box-shadow:0 2px 6px rgba(43,26,23,.12)}
.zoomctl button:hover{background:#fff;color:var(--cinnabar);border-color:var(--cinnabar)}
.zoomctl .fit{font-size:11px;font-weight:700}
.legend{position:absolute;left:12px;bottom:12px;background:rgba(251,247,236,.92);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:11.5px;color:var(--ink-soft);z-index:15;line-height:1.85}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px}
.legend .sm{background:var(--c-m)}.legend .sf{background:var(--c-f)}.legend .sx{background:var(--c-x)}
.banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--ink-soft);z-index:5;max-width:80%}
.banner .big{font-family:"Noto Serif TC",serif;font-size:17px;color:var(--cinnabar);margin-bottom:8px}
.banner .sm{font-size:12.5px;line-height:1.7}
.banner.err .big{color:#a33}
.spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--cinnabar);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}
@media (max-width:760px){
  header.hero{padding:16px 16px 12px}
  .origin{display:none}
  .hero-inner{gap:14px}
  .legend{display:none}
}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-inner">
    <div class="hero-main">
      <div class="eyebrow">福建 泉州府 南安縣 十六都 芙蓉鄉　·　隴西李氏</div>
      <h1>山內村<span class="dot">·</span>李氏族譜</h1>
      <div class="sub">雲林縣 元長鄉 山內村　大房頂房 世系</div>
      <div class="founder"><span class="tag">始 祖</span><span class="nm">李 萬<small>配　吳碟 六娘</small></span></div>
      <div class="origin">李氏先祖世居<b>福建泉州府南安縣十六都芙蓉鄉</b>，渡海移居<b>雲林縣元長鄉</b>。始祖李萬育三子——<b>李墻、李仁、李居</b>，分為三房；大房頂房定居<b>元長鄉山內村</b>。</div>
    </div>
    <div class="hero-stats" id="stats"></div>
  </div>
</header>

<div class="toolbar">
  <div class="seg" id="branchSeg">
    <button data-b="all" class="on">全部</button><button data-b="0">大房</button><button data-b="1">二房</button><button data-b="2">三房</button>
  </div>
  <div class="search"><input id="search" type="search" placeholder="搜尋姓名…" autocomplete="off"></div>
  <button class="btn" id="viewBtn">▦ 圖形／清單</button>
  <button class="btn" id="expandAll">展開</button>
  <button class="btn" id="collapseAll">收合</button>
  <button class="btn" id="refresh">↻</button>
</div>

<div class="stage">
  <svg id="svg"><g id="viewport"></g></svg>
  <div id="list"></div>
  <div class="legend">
    <span><i class="sm"></i>李氏男系</span>　<span><i class="sf"></i>李氏女系</span>　<span><i class="sx"></i>外姓子孫</span><br>
    <span style="color:var(--muted)">點節點＝放大並展開／收合　·　拖曳平移　·　滾輪縮放</span>
  </div>
  <div class="zoomctl">
    <button id="zin">＋</button><button id="zout">－</button><button class="fit" id="zfit">全覽</button>
  </div>
  <div class="banner" id="banner" style="display:none"></div>
</div>

<script>
/* ===================== 設定區 =====================
   填入 GAS 網頁應用程式網址（部署後 .../exec），即可即時讀取試算表。
   做法見「族譜_設定說明」。本檔不含任何族譜內容，資料全部來自試算表。 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwdGQ8nY5v1Flr7_nbikamK7euOnJ7THLW0wLxEqQn3oSl-n8MLbgWMyreI_ywvunTnZQ/exec";
const FOUNDER = { name:"李萬", spouse:["吳碟六娘"] };   // 始祖（試算表未收錄，僅作樹頂靜態節點）
const HAS_D3 = (typeof d3 !== 'undefined');

/* ---------- 工具 ---------- */
const CN={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function genOfKey(k){const m=String(k).match(/^第(.+)代$/);if(!m)return null;return CN[m[1]]||parseInt(m[1])||null;}
function numCN(n){const a=['','一','二','三','四','五','六','七','八','九','十'];if(n<=10)return a[n];if(n<20)return '十'+a[n-10];return String(n);}
function rankRole(n,sex){return (n===1?'長':n===2?'次':numCN(n))+(sex==='女'?'女':'子');}
function parentName(note){return note?note.replace(/[長次三四五六七八九十兩幼么元滿大小細]?[子女男]$/,'').trim():'';}
function kindOf(name,sex){const s=(name||'').trim().charAt(0);if(s!=='李')return 'x';return sex==='女'?'f':'m';}

function buildHouse(rows){
  const nodes=[];
  rows.forEach((r,idx)=>{
    let gen=null,name='';
    for(const k in r){const g=genOfKey(k);if(g&&String(r[k]).trim()){gen=g;name=String(r[k]).trim();break;}}
    if(!name)return;
    const note=(r['備註']||'').trim();
    const sexCN=(String(r['子女']||'').trim()==='女')?'女':'子';
    const sp=(r['配偶']||'').trim()?String(r['配偶']).split(/[、,，]/).map(s=>s.trim()).filter(Boolean):[];
    nodes.push({row:idx,gen,name,note,sexCN,gender:sexCN==='女'?'女':'男',spouse:sp,
      birth:(r['生年']||'').trim(),death:(r['卒年']||'').trim(),photo:(r['照片網址']||r['照片']||'').trim(),
      kind:kindOf(name,sexCN),role:'',children:[]});
  });
  let root=null;
  nodes.forEach((n,i)=>{
    if(n.gen===1){if(!root)root=n;return;}
    const pn=parentName(n.note);let parent=null;
    for(let j=i-1;j>=0;j--){if(nodes[j].gen===n.gen-1&&nodes[j].name===pn){parent=nodes[j];break;}}
    if(!parent)for(let j=i-1;j>=0;j--){if(nodes[j].gen===n.gen-1){parent=nodes[j];break;}}
    (parent||root).children.push(n);
  });
  (function rank(n){let c=0,d=0;n.children.forEach(k=>{if(k.sexCN==='女'){d++;k.role=rankRole(d,'女');}else{c++;k.role=rankRole(c,'子');}rank(k);});})(root);
  return root;
}
function buildModel(dataObj){
  const houses=Object.keys(dataObj).map(k=>buildHouse(dataObj[k])).filter(Boolean);
  houses.forEach((h,i)=>h.role=rankRole(i+1,'子'));
  return {name:FOUNDER.name,role:'始祖',sexCN:'子',gender:'男',kind:'root',spouse:FOUNDER.spouse.slice(),
    birth:'',death:'',photo:'',children:houses};
}

/* ---------- 取資料（僅試算表） ---------- */
function jsonp(url){return new Promise((res,rej)=>{
  const cb='__fam_'+Math.random().toString(36).slice(2);const s=document.createElement('script');
  window[cb]=d=>{res(d);delete window[cb];s.remove();};
  s.onerror=()=>{rej(new Error('JSONP 失敗'));s.remove();};
  s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;document.body.appendChild(s);
  setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();rej(new Error('逾時'));}},12000);
});}
let MODEL=null,SOURCE='';
async function loadModel(){
  if(window.__MOCK__){MODEL=buildModel(window.__MOCK__);SOURCE='mock';return true;}   // 本機測試用，正式檔不含
  if(GAS_URL){
    try{const j=await jsonp(GAS_URL);if(j&&j.ok&&j.data){MODEL=buildModel(j.data);SOURCE='live';return true;}throw new Error('格式錯誤');}
    catch(e){console.error(e);MODEL=null;SOURCE='err';return false;}
  }
  MODEL=null;SOURCE='none';return false;
}

/* ---------- 共用 ---------- */
let currentRootData=null;
function countStats(node){let dir=0,m=0,f=0,sp=0;
  (function w(n){if(n.kind!=='root'){dir++;if(n.gender==='女')f++;else m++;sp+=(n.spouse?n.spouse.filter(x=>x&&x!=='（佚名）').length:0);}(n.children||[]).forEach(w);})(node);
  return {dir,m,f,sp};}
function maxDepth(node){let mx=0;(function w(n,d){mx=Math.max(mx,d);(n.children||[]).forEach(c=>w(c,d+1));})(node,0);return mx;}
function maxGen(node){let mx=0;(function w(n){if(n.gen)mx=Math.max(mx,n.gen);(n.children||[]).forEach(w);})(node);return mx;}
function renderStats(){
  if(!currentRootData){document.getElementById('stats').innerHTML='';return;}
  const s=countStats(currentRootData),live=SOURCE==='live';
  document.getElementById('stats').innerHTML=
   `<div class="stat"><div class="num">${MODEL.children.length}</div><div class="lbl">大房分支</div></div>
    <div class="stat"><div class="num">${maxGen(currentRootData)}</div><div class="lbl">傳承世代</div></div>
    <div class="stat"><div class="num">${s.dir}<span class="mf">（男${s.m}·女${s.f}）</span></div><div class="lbl">直系子孫</div></div>
    <div class="stat"><div class="num">${s.dir+s.sp}</div><div class="lbl">含配偶總計</div></div>
    <div class="src-line"><span class="dot-live ${live?'':'dot-demo'}"></span>${live?'已連動試算表（即時）':(SOURCE==='mock'?'本機測試資料':'尚未連動試算表')}</div>`;
}

/* ---------- 視圖切換 ---------- */
let VIEW = (HAS_D3 && window.innerWidth>=820)?'tree':'list';
function applyViewVisibility(){
  document.getElementById('svg').style.display = VIEW==='tree'?'block':'none';
  document.getElementById('list').style.display = VIEW==='list'?'block':'none';
  document.querySelector('.zoomctl').style.display = VIEW==='tree'?'flex':'none';
  document.querySelector('.legend').style.display = (VIEW==='tree'&&window.innerWidth>760)?'block':'none';
}

/* =========================================================
   A) 桌機：d3 由上而下、直書名字
   ========================================================= */
const svg=HAS_D3?d3.select('#svg'):null, vp=HAS_D3?d3.select('#viewport'):null;
const DIM={w:96,h:150,cross:118,level:182};
let zoom=null, tree=null, rootD3=null, uid=0;
if(HAS_D3){
  zoom=d3.zoom().scaleExtent([0.08,2.2]).on('zoom',e=>vp.attr('transform',e.transform));
  svg.call(zoom);
  tree=d3.tree().nodeSize([DIM.cross,1]);
}
function px(d){return d.x;} function py(d){return d.depth*DIM.level;}
function setTree(){
  rootD3=d3.hierarchy(currentRootData,d=>d.children);
  rootD3.each(d=>{if(d.depth>=2&&d.children){d._children=d.children;d.children=null;}});
  updateTree(rootD3);setTimeout(fitView,60);
}
function updateTree(source){
  tree(rootD3);
  const nodes=rootD3.descendants(),links=rootD3.links(),W=DIM.w,H=DIM.h;
  const link=vp.selectAll('path.link').data(links,d=>d.target.__id||(d.target.__id=++uid));
  link.exit().remove();
  link.enter().append('path').attr('class',d=>'link'+lin(d)).attr('d',()=>el(source.x0||0,source.y0||0,source.x0||0,source.y0||0,H))
    .merge(link).transition().duration(320).attr('class',d=>'link'+lin(d)).attr('d',d=>el(px(d.source),py(d.source),px(d.target),py(d.target),H));
  const node=vp.selectAll('g.node').data(nodes,d=>d.__id||(d.__id=++uid));
  node.exit().transition().duration(280).style('opacity',0).remove();
  const en=node.enter().append('g').attr('class','node').attr('transform',`translate(${source.x0||0},${source.y0||0})`).style('opacity',0)
    .on('click',(e,d)=>{e.stopPropagation();toggleTree(d);zoomTo(d);});
  en.append('foreignObject').attr('width',W).attr('x',-W/2);
  const merged=en.merge(node);
  merged.select('foreignObject').attr('height',H).attr('y',-H/2).html(d=>cardHTML(d));
  merged.transition().duration(320).attr('transform',d=>`translate(${px(d)},${py(d)})`).style('opacity',1);
  nodes.forEach(d=>{d.x0=px(d);d.y0=py(d);});source.x0=px(source);source.y0=py(source);
}
function lin(d){const k=d.target.data.kind;return (k==='m'||k==='root')?' lineage':'';}
function el(sx,sy,tx,ty,H){const my=(sy+ty)/2;return `M${sx},${sy+H/2-6} V${my} H${tx} V${ty-H/2+6}`;}
function cardHTML(d){
  const o=d.data,has=d.children||d._children,cnt=has?(d.children?d.children.length:d._children.length):0,open=!!d.children;
  let life='';if(o.birth||o.death)life=o.death?`${o.birth||'?'}–${o.death}`:`${o.birth}– 在世`;
  const role=o.kind==='root'?'始祖':(o.role||'');
  return `<div class="card k-${o.kind} ${o.kind==='root'?'root':''}" data-name="${o.name} ${(o.spouse||[]).join(' ')}">
    ${o.photo?`<img class="ph" src="${o.photo}" onerror="this.style.display='none'">`:''}
    ${role?`<span class="role">${role}</span>`:''}
    <span class="nm">${o.name}</span>
    ${(o.spouse&&o.spouse.length)?`<span class="sp"><span class="mk">⚭</span>${o.spouse.join('、')}</span>`:''}
    ${life?`<span class="life">${life}</span>`:''}
    ${cnt?`<span class="kids ${open?'open':''}">${open?'–':cnt}</span>`:''}
  </div>`;
}
function toggleTree(d){if(d.children){d._children=d.children;d.children=null;}else if(d._children){d.children=d._children;d._children=null;}updateTree(d);}
function svgSize(){const r=svg.node().getBoundingClientRect();return [r.width,r.height];}
function zoomTo(d){const [w,h]=svgSize(),s=0.9;svg.transition().duration(420).call(zoom.transform,d3.zoomIdentity.translate(w/2-px(d)*s,h*0.30-py(d)*s).scale(s));}
function fitView(){if(!rootD3)return;const ns=rootD3.descendants(),W=DIM.w,H=DIM.h;
  const X=ns.map(px),Y=ns.map(py);const x0=Math.min(...X)-W,x1=Math.max(...X)+W,y0=Math.min(...Y)-H,y1=Math.max(...Y)+H;
  const [w,h]=svgSize(),s=Math.min(1.4,0.92*Math.min(w/(x1-x0),h/(y1-y0)));
  svg.transition().duration(420).call(zoom.transform,d3.zoomIdentity.translate(w/2-s*(x0+x1)/2,h/2-s*(y0+y1)/2).scale(s));}
document.getElementById('zin').onclick=()=>svg.transition().call(zoom.scaleBy,1.3);
document.getElementById('zout').onclick=()=>svg.transition().call(zoom.scaleBy,1/1.3);
document.getElementById('zfit').onclick=fitView;

/* =========================================================
   B) 手機：縮排清單（第一版風格）
   ========================================================= */
const listEl=document.getElementById('list');
function setList(){listEl.innerHTML='';listEl.appendChild(listNode(currentRootData,0));}
function listNode(o,depth){
  const has=o.children&&o.children.length;
  const wrap=document.createElement('div');
  wrap.className='lnode k-'+o.kind+((o.kind==='m'||o.kind==='root')?' lineage':'')+((depth>=2&&has)?' collapsed':'')+(o.kind==='root'?' root':'');
  let life='';if(o.birth||o.death)life=o.death?`${o.birth||'?'}–${o.death}`:`${o.birth}– 在世`;
  const role=o.kind==='root'?'始祖':(o.role||'');
  const row=document.createElement('div');row.className='lrow';
  row.dataset.name=o.name+' '+(o.spouse||[]).join(' ');
  row.innerHTML=`<span class="ltoggle ${has?'':'empty'}">▾</span>
    <span class="lperson"><span class="lnm">${o.name}</span>${role?`<span class="lrole">${role}</span>`:''}
    ${(o.spouse&&o.spouse.length)?`<span class="lsp"><span class="mk">⚭</span>${o.spouse.join('、')}</span>`:''}
    ${life?`<span class="llife">${life}</span>`:''}${has?`<span class="lcnt">（${o.children.length}）</span>`:''}</span>`;
  wrap.appendChild(row);
  if(has){const kids=document.createElement('div');kids.className='lkids';
    o.children.forEach(c=>kids.appendChild(listNode(c,depth+1)));wrap.appendChild(kids);
    row.querySelector('.ltoggle').addEventListener('click',e=>{e.stopPropagation();wrap.classList.toggle('collapsed');});
    row.addEventListener('click',()=>wrap.classList.toggle('collapsed'));
  }
  return wrap;
}

/* ---------- 視圖統一入口 ---------- */
function renderActive(){
  applyViewVisibility();
  if(!currentRootData)return;
  if(VIEW==='tree'){vp.selectAll('*').remove();setTree();}
  else setList();
}
function setRoot(node){currentRootData=node;renderStats();renderActive();}

/* ---------- 控制 ---------- */
document.getElementById('branchSeg').addEventListener('click',e=>{const b=e.target.dataset.b;if(b===undefined||!MODEL)return;
  document.querySelectorAll('#branchSeg button').forEach(x=>x.classList.toggle('on',x===e.target));
  setRoot(b==='all'?MODEL:MODEL.children[+b]);});
document.getElementById('viewBtn').onclick=()=>{if(!HAS_D3)return;VIEW=VIEW==='tree'?'list':'tree';renderActive();};
document.getElementById('expandAll').onclick=()=>{
  if(VIEW==='tree'){rootD3.each(d=>{if(d._children){d.children=d._children;d._children=null;}});updateTree(rootD3);setTimeout(fitView,80);}
  else listEl.querySelectorAll('.lnode').forEach(n=>n.classList.remove('collapsed'));};
document.getElementById('collapseAll').onclick=()=>{
  if(VIEW==='tree'){rootD3.each(d=>{if(d.depth>=1&&d.children){d._children=d.children;d.children=null;}});updateTree(rootD3);setTimeout(fitView,80);}
  else listEl.querySelectorAll('.lnode').forEach(n=>{if(n.querySelector(':scope>.lkids'))n.classList.add('collapsed');});};

let stmr;const se=document.getElementById('search');
se.addEventListener('input',()=>{clearTimeout(stmr);stmr=setTimeout(doSearch,160);});
function doSearch(){const q=se.value.trim();
  if(VIEW==='tree'){
    vp.selectAll('.card').classed('hit',false);if(!q)return;let target=null;
    (function f(d){if(d.data.name.includes(q)||(d.data.spouse||[]).some(s=>s.includes(q)))target=target||d;(d.children||d._children||[]).forEach(c=>{c.parent=d;f(c);});})(rootD3);
    if(!target)return;let p=target,ch=[];while(p){ch.unshift(p);p=p.parent;}ch.forEach(d=>{if(d._children){d.children=d._children;d._children=null;}});
    updateTree(rootD3);setTimeout(()=>{vp.selectAll('g.node').filter(d=>d===target).select('.card').classed('hit',true);zoomTo(target);},140);
  }else{
    const rows=[...listEl.querySelectorAll('.lrow')];rows.forEach(r=>r.classList.remove('hit','dim'));if(!q)return;let any=false;
    rows.forEach(r=>{if(r.dataset.name.includes(q)){any=true;r.classList.add('hit');let p=r.closest('.lnode');while(p){p.classList.remove('collapsed');p=p.parentElement.closest('.lnode');}}else r.classList.add('dim');});
    const f=listEl.querySelector('.lrow.hit');if(f)f.scrollIntoView({block:'center',behavior:'smooth'});
  }
}
document.getElementById('refresh').onclick=async()=>{showBanner('讀取中…');const ok=await loadModel();if(ok){hideBanner();boot();}else showNoData();};

function showBanner(m,err){const b=document.getElementById('banner');b.style.display='block';b.className='banner'+(err?' err':'');b.innerHTML=(err?'':'<div class="spin"></div>')+`<div class="big">${err?'⚠ ':''}${m}</div>`;}
function showNoData(){const b=document.getElementById('banner');b.style.display='block';b.className='banner';
  b.innerHTML=`<div class="big">尚未連動試算表</div><div class="sm">請依「族譜_設定說明」部署 GAS，<br>並把網址填入本檔最上方的 GAS_URL。<br>填好後重新整理即可顯示族譜。</div>`;
  document.getElementById('stats').innerHTML='';}
function hideBanner(){document.getElementById('banner').style.display='none';}
function boot(){
  if(!MODEL){showNoData();return;}
  hideBanner();
  document.querySelectorAll('#branchSeg button').forEach(x=>x.classList.toggle('on',x.dataset.b==='all'));
  setRoot(MODEL);
}
window.addEventListener('resize',()=>{const want=(HAS_D3 && window.innerWidth>=820)?'tree':'list';if(want!==VIEW){VIEW=want;renderActive();}else applyViewVisibility();});
(async function(){applyViewVisibility();showBanner('讀取中…');const ok=await loadModel();if(ok)boot();else showNoData();})();
</script>
</body>
